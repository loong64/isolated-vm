name: CI
on:
  workflow_dispatch:
    inputs:
      tag:
        default: ''
        description: 'build tag'
        type: string
        required: false
  schedule:
    - cron: '0 10 * * *' # every Sunday at midnight

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  check-binaries:
    runs-on: ubuntu-slim
    outputs:
      create: ${{ steps.check-release.outputs.create }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Get Version
        id: get-version
        run: |
          version=${{ inputs.tag }}
          if [ "${{ github.event_name }}" = "schedule" ]; then
            version=$(curl -s "https://api.github.com/repos/laverdet/isolated-vm/releases/latest" | jq -r .tag_name)
          fi
          if [ -z "${version}" ] || [ "${version}" == "null" ]; then
            echo "Failed to get version"
            exit 1
          fi
          
          echo "version=${version}" >> $GITHUB_ENV
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo ""
          echo "========== Build Args =========="
          echo "version=${version}"

      - name: Check Release
        id: check-release
        run: |
          gh release view ${version} -R ${{ github.repository }} >/dev/null 2>&1 || echo "create=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prebuild-linux:
    runs-on: ubuntu-latest
    needs: check-binaries
    if: needs.check-binaries.outputs.create == '1'
    strategy:
      fail-fast: false
      matrix:
        arch: [ loong64 ]
        os: [ debian, alpine ]
    name: ${{ matrix.os }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: laverdet/isolated-vm
          ref: ${{ needs.check-binaries.outputs.version }}
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Setup Build
        run: |
          sed -i 's@bullseye@trixie@g' Dockerfile.debian
          # sed -i 's@alpine3.20@alpine3.21@g' Dockerfile.alpine
          sed -i 's@FROM node@FROM ghcr.io/loong64/node@g' Dockerfile.${{ matrix.os }}
      - name: Build
        run: |
          docker buildx build --platform linux/${{ matrix.arch }} . -f Dockerfile.${{ matrix.os }} --output prebuilds
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds

  release:
    runs-on: ubuntu-slim
    needs: [check-binaries, prebuild-linux]
    if: needs.check-binaries.outputs.create == '1'
    steps:
      - uses: actions/checkout@v6
        with:
          repository: laverdet/isolated-vm
          ref: ${{ needs.check-binaries.outputs.version }}

      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds

      - name: Verify bundled prebuilds
        run: |
          find prebuilds -type f -name '*.node' | sort

      - name: Pack npm tarball
        run: |
          npm pack

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.check-binaries.outputs.version }}
          tag_name: ${{ needs.check-binaries.outputs.version }}
          files: isolated-*.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
